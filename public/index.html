<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Local Plan Viewer</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div>
          <h1>Local Plans</h1>
          <p class="eyebrow">Plan Folders</p>
        </div>
        <button id="refreshPlans" type="button" title="Refresh plan list">↻</button>
      </div>
      <nav id="planList" class="plan-list" aria-label="Available plans"></nav>
    </aside>
    <main class="document-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local MDX renderer</p>
          <h2 id="planTitle">Loading plan...</h2>
          <p id="planPath" class="source-path"></p>
        </div>
        <div class="topbar-actions">
          <a id="openSource" href="#" aria-disabled="true">Source</a>
          <button id="refreshPlan" type="button" title="Reload current plan">Reload</button>
        </div>
      </header>
      <article id="planDocument" class="plan-document"></article>
    </main>
  </div>
  <script type="module" src="/app.js"></script>
</body>
</html>
